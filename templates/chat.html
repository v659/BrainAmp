<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with AI Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/chat.css?v=20260503-3">
</head>

<body>

<div class="left-sidebar" id="chat-sidebar">
    <div class="sidebar-header">
        <h2>Chats</h2>
        <button class="new-chat-btn" onclick="startNewChat()">+ New</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
</div>

<div class="left-sidebar sidebar-hidden" id="course-sidebar">
    <div class="sidebar-header">
        <h2>Saved Courses</h2>
    </div>
    <div class="chat-list" id="course-list"></div>
</div>

<div class="left-sidebar sidebar-hidden" id="quiz-sidebar">
    <div class="sidebar-header">
        <h2>Saved Quizzes</h2>
    </div>
    <div class="chat-list" id="quiz-list"></div>
</div>

<button class="toggle-sidebar-btn" onclick="toggleChatSidebar()">☰</button>

<div class="main-content">
    <div class="top-bar">
        <h1>AI Tutor</h1>
        <button class="go-back-btn" onclick="location.href='/dashboard'">Dashboard</button>
    </div>

    <div class="chat-interface">
        <div id="topics-container"></div>
    </div>
</div>

<script src="/static/script.js?v=20260503-3"></script>
<script>
window.onload = function() {
    loadChatTopics();
    loadAllChats();
};
</script>

</body>
</html>
